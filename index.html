<!DOCTYPE html>
<html>
<head>
    <title>VC Dispatch | Driver Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#28B92D">
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .app-card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; box-sizing: border-box; }
        h1 { color: #28B92D; font-size: 28px; margin: 0 0 20px 0; }
        input, select { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #eee; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-confirm { width: 100%; height: 120px; background: #28B92D; border-radius: 25px; border: none; color: white; font-size: 22px; font-weight: 800; cursor: pointer; box-shadow: 0px 8px 20px rgba(40, 185, 45, 0.3); margin-bottom: 15px; }
        .btn-fail { width: 100%; height: 80px; background: #D94B28; border-radius: 25px; border: none; color: white; font-size: 18px; font-weight: 800; cursor: pointer; }
        .btn-login { width: 100%; padding: 15px; background: #28B92D; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-confirm:active, .btn-fail:active { transform: scale(0.96); }
        .hidden { display: none !important; }
        #log-container { width: 100%; max-width: 400px; margin-top: 25px; }
        .log-entry { background: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 14px; display: flex; justify-content: space-between; border-left: 5px solid #28B92D; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="app-card">
            <h1>Valley Connection</h1>
            <input type="password" id="pass-input" placeholder="Access Code">
            <input type="text" id="name-input" placeholder="Driver Name">
            <button class="btn-login" onclick="checkAuth()">SIGN IN</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="app-card">
            <h1 id="driver-header">Dispatch</h1>
            <label style="display:block; text-align:left; font-size:12px; margin-bottom:5px; font-weight:bold;">SELECT RESIDENT</label>
            <select id="cust-select">
                <option value="">-- Loading Residents... --</option>
            </select>

            <button id="confirm-btn" class="btn-confirm" onclick="handleSync('Dropped Off')">CONFIRM<br>DROP-OFF</button>
            <button id="fail-btn" class="btn-fail" onclick="handleSync('NOT DELIVERED')">NOT DELIVERED</button>
        </div>
