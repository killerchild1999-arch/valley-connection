<!DOCTYPE html>
<html>
<head>
    <title>VC | Resident Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        h1 { color: #28B92D; margin-bottom: 10px; font-size: 24px; }
        label { display: block; text-align: left; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #444; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; }
        .btn-reg { width: 100%; padding: 18px; background: #28B92D; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h1>Resident Sign-Up</h1>
    <p style="color:#666; font-size:14px; margin-bottom:20px;">Register for Valley Connection deliveries.</p>

    <label>CUSTOMER NAME</label>
    <input type="text" id="cust-name" placeholder="Full Name">

    <label>ADDRESS</label>
    <input type="text" id="cust-addr" placeholder="Street, City, Zip">

    <label>PHONE NUMBER</label>
    <input type="tel" id="cust-phone" placeholder="907-xxx-xxxx">

    <button class="btn-reg" onclick="submitReg()">SUBMIT REGISTRATION</button>
</div>

<script>
    // PASTE YOUR NEW DEPLOYMENT URL HERE
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbwqc1TCDcaSJZJWY0V6E7rBaP9deVN1aEb_Wghl13b-Opmxf745FOrrjF3y8IrXEgW47g/exec';

    async function submitReg() {
        const name = document.getElementById('cust-name').value;
        const addr = document.getElementById('cust-addr').value;
        const phone = document.getElementById('cust-phone').value;

        if (!name || !addr) return alert("Please fill out Name and Address.");

        const payload = {
            action: "register_customer",
            name: name,
            address: addr,
            phone: phone
        };

        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Success! You are now registered.");
            location.reload(); 
        } catch (err) {
            alert("Error connecting to server.");
        }
    }
</script>

</body>
</html>
